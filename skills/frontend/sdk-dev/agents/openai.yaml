interface:
  display_name: "put.io SDK Dev"
  short_description: "Develop or review put.io SDKs"
  default_prompt: |
    Use $putio-sdk-dev.

    Goal: develop or review put.io SDK repositories with public, domain-first, strongly typed API contracts that match verified backend behavior and app usage.

    Success criteria:
    - The repo-local `AGENTS.md`, package overview, relevant docs, and target namespace or transport code are inspected before changes.
    - Backend behavior, backend tests, current first-party app usage, and sibling SDKs are checked in source-of-truth order when contracts change.
    - Request, response, error models, tests, docs, and live verification are updated together when the public surface changes.

    Constraints:
    - Do not widen SDK scope from old SDK parity alone.
    - Do not add destructive live tests against shared accounts.
    - Do not weaken TypeScript type-safety or copy repo-specific implementation guidance into this shared skill.

    Output: summarize SDK surface changed or reviewed, evidence sources, verification run, parity or non-parity decisions, gaps, and next step.

    Stop rules: stop and ask or report blocked when backend behavior, app usage, safe live-test access, or package release implications cannot be verified.
